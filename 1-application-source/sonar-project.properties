sonar.projectKey=multi-stack-voting-application
sonar.projectName=Multi-Stack Voting Application
sonar.projectVersion=1.0

# Repository root is expected as scanner working directory in Jenkins.
sonar.sources=1-application-source
sonar.sourceEncoding=UTF-8

# Keep analysis focused on source and exclude generated/build/vendor assets.
sonar.exclusions=**/node_modules/**,**/obj/**,**/bin/**,**/__pycache__/**,**/*.min.js,**/socket.io.js,**/angular.min.js,**/coverage/**,**/.venv/**,**/venv/**,**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.svg
sonar.tests=1-application-source
sonar.test.inclusions=**/*test*/**,**/*tests*/**
