# Ironhack note - This file is for running in docker compose with prebuilt images
# Use these if you're stuck, or if you want to start slowly migrating from external images into your own.

services:
  vote:
    image: ${VOTE_IMAGE:-dockersamples/examplevotingapp_vote}
    depends_on:
      redis:
        condition: service_healthy 
    ports:
      - "8000:80"
    networks:
      - front-tier
      - back-tier

  result:
    image: ${RESULT_IMAGE:-dockersamples/examplevotingapp_result}
    environment:
      PG_HOST: "db"
      PG_PORT: "5432"
      PG_USER: "${POSTGRES_USER:-postgres}"
      PG_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      PG_DATABASE: "${POSTGRES_DB:-votes}"
    depends_on:
      db:
        condition: service_healthy 
    ports:
      - "8081:80"
    networks:
      - front-tier
      - back-tier

  worker:
    image: ${WORKER_IMAGE:-dockersamples/examplevotingapp_worker}
    environment:
      REDIS_HOST: "redis"
      DB_HOST: "db"
      DB_USERNAME: "${POSTGRES_USER:-postgres}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      DB_NAME: "${POSTGRES_DB:-votes}"
    depends_on:
      redis:
        condition: service_healthy 
      db:
        condition: service_healthy 
    networks:
      - back-tier

  redis:
    image: redis:alpine
    volumes:
      - "./1-application-source/healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/redis.sh
      interval: "5s"
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-votes}"
    volumes:
      - "db-data:/var/lib/postgresql/data"
      - "./1-application-source/healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/postgres.sh
      interval: "5s"
    networks:
      - back-tier

volumes:
  db-data:

networks:
  front-tier:
  back-tier:
