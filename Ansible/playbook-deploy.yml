---
- name: Deploy Queue and Integration Processing Worker Tier
  vars:
    db_host: "{{ lookup('env', 'DB_HOST') | default('dev-postgres-multiaz.c838mqg04y36.us-east-1.rds.amazonaws.com', true) }}"
    db_port: "{{ lookup('env', 'DB_PORT') | default('5432', true) }}"
    db_username: "{{ lookup('env', 'DB_USERNAME') | default('postgres', true) }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') | default('your_secure_password', true) }}"
    db_name: "{{ lookup('env', 'DB_NAME') | default('postgres', true) }}"
  hosts: backend
  tasks:
    - name: Launch In-Memory Redis Queue Cache
      community.docker.docker_container:
        name: redis-queue
        image: redis:alpine
        state: started
        restart_policy: always
        ports:
          - "6379:6379"

    - name: Deploy .NET Core Background Execution Worker Engine
      community.docker.docker_container:
        name: integration-worker
        image: "ceteris90/worker:latest"
        state: started
        restart_policy: always
        network_mode: host
        env:
          # 💻 FIXED: Environment keys perfectly aligned to match your Dockerfile runtime signatures
          REDIS_HOST: "127.0.0.1"
          DB_HOST: "{{ db_host }}"
          DB_PORT: "{{ db_port }}"
          DB_USERNAME: "{{ db_username }}"
          DB_PASSWORD: "{{ db_password }}"
          DB_NAME: "{{ db_name }}"
          DB_SSL: "true"

- name: Deploy Web Application Facing Presentation Layer
  hosts: frontend
  vars:
    db_host: "{{ lookup('env', 'PG_HOST') | default('dev-postgres-multiaz.c838mqg04y36.us-east-1.rds.amazonaws.com', true) }}"
    db_port: "{{ lookup('env', 'PG_PORT') | default('5432', true) }}"
    db_username: "{{ lookup('env', 'PG_USER') | default('postgres', true) }}"
    db_password: "{{ lookup('env', 'PG_PASSWORD') | default('your_secure_password', true) }}"
    db_name: "{{ lookup('env', 'PG_DATABASE') | default('postgres', true) }}"
  tasks:
    - name: Deploy Python Flask Client Frontend Application
      community.docker.docker_container:
        name: voting-app
        image: "ceteris90/vote:latest"
        state: started
        restart_policy: always
        env:
          REDIS_HOST: "10.0.2.248"
        ports:
          - "80:80"

    - name: Deploy Node.js Angular Metric Dashboard Display Result App
      community.docker.docker_container:
        name: results-app
        image: "ceteris90/result:latest"
        pull: true
        state: started
        restart_policy: always
        network_mode: host # 🟢 FIXED: Bypasses isolation so it can talk directly to the DB subnet
        env:
          PG_HOST: "{{ db_host }}"
          PG_PORT: "{{ db_port }}"
          PG_USER: "{{ db_username }}"
          PG_PASSWORD: "{{ db_password }}"
          PG_DATABASE: "{{ db_name }}"
          PG_SSL: "true"
          DATABASE_CONNECTION_STRING: "postgresql://{{ db_username }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}"
          CONNECTION_STRING: "postgresql://{{ db_username }}:{{ db_password }}@{{ db_host }}:{{ db_port }}/{{ db_name }}"
          PORT: "8080" # 🟢 FIXED: Forces the application engine to bind straight to port 8080