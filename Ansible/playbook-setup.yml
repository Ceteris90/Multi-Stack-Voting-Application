---
- name: Prepare Nodes and Install Docker Ecosystem
  hosts: all
  become: true
  tasks:
    - name: Run system updates (apt-get update)
      ansible.builtin.apt:
        update_cache: yes
        force_apt_get: yes
        cache_valid_time: 3600

    - name: Deploy required system dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
          - telnet
        state: present

    - name: Download and integrate Docker official GPG signing key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add official stable Docker repository to package sources
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE engine packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Validate that Docker Engine daemon is started and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Append current user to the administrative docker engine group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Force immediate SSH session restart to apply group privileges
      ansible.builtin.meta:
        clear_facts